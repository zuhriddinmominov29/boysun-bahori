<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 195">

  <!-- Orange arch (far right, drawn first) -->
  <path d="M605,32 C618,-4 648,-4 661,32 L661,128 L648,117 C638,109 624,109 612,117 L605,128 Z" fill="#BF5B16"/>

  <!-- Purple mountain peaks -->
  <polygon points="198,22 232,80 164,80" fill="#673AB7"/>
  <polygon points="236,6 283,80 189,80" fill="#5C33A6"/>
  <polygon points="270,16 315,80 225,80" fill="#7E57C2"/>
  <polygon points="303,27 337,80 269,80" fill="#673AB7" opacity="0.78"/>

  <!-- Yellow moon -->
  <circle cx="360" cy="30" r="27" fill="#FFD600"/>
  <!-- Crescent shadow -->
  <circle cx="371" cy="25" r="24" fill="#7E57C2" opacity="0.55"/>

  <!-- Green landscape hills -->
  <path d="M83,128 C130,94 185,116 244,100 C294,87 350,74 407,97 C454,115 513,91 568,107 C603,117 635,104 680,111 L680,195 L83,195 Z" fill="#4CAF50"/>

  <!-- Blue water wave -->
  <path d="M83,150 C148,136 212,155 280,141 C350,126 420,147 494,133 C548,123 617,143 680,132 L680,195 L83,195 Z" fill="#1A237E" opacity="0.88"/>

  <!-- Red decorative wheel (Boysun sun ornament) -->
  <g transform="translate(67,133)">
    <!-- Outer scalloped ring - 16-point star -->
    <polygon points="
      0,-70  21,-54  47,-47  54,-22
      70,0   54,22   47,47   21,54
      0,70  -21,54  -47,47  -54,22
      -70,0  -54,-22  -47,-47  -21,-54
    " fill="#8B0000"/>
    <!-- Main red circle -->
    <circle r="60" fill="#B71C1C"/>
    <!-- Decorative inner ring -->
    <circle r="46" fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="2"/>
    <!-- Decorative inner ring 2 -->
    <circle r="30" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <!-- B letter -->
    <text y="18" text-anchor="middle"
      font-family="'Palatino Linotype', Palatino, Georgia, serif"
      font-size="54" fill="#1A237E" font-weight="900">B</text>
  </g>

  <!-- Text "oysun bahori" (B is in the wheel above) -->
  <text x="128" y="152"
    font-family="'Palatino Linotype', Palatino, Georgia, serif"
    font-size="52" fill="#1A237E" font-weight="700" letter-spacing="1">oysun bahori</text>

</svg>
